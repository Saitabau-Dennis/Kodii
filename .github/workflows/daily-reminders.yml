name: Daily Rent Reminders

on:
  schedule:
    # Runs at 05:00 UTC (8:00 AM EAT) every day
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Reminders API
        run: |
          curl -X GET "${{ secrets.APP_URL }}/api/reminders" \
          -H "x-reminder-secret: ${{ secrets.REMINDER_SECRET }}" \
          -f
